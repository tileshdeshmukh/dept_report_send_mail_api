<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Emp Dept</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <div class="brand-icon">ED</div>
        <h4 class="text-center mb-1">Welcome back</h4>
        <p class="text-center text-muted mb-4">Sign in to manage departments &amp; reports</p>

        <div id="alertHost"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" required autofocus />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required />
          </div>
          <button type="submit" class="btn btn-brand w-100" id="loginBtn">Login</button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size: 0.9rem;">
          Don't have an account? <a href="register.html">Register</a>
        </p>
      </div>
    </div>
  </div>

  <div id="toastHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Already logged in? skip straight to the dashboard.
    if (getToken()) {
      window.location.href = "dashboard.html";
    }

    const form = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const alertHost = document.getElementById("alertHost");

    function showAlert(message) {
      alertHost.innerHTML = `<div class="alert alert-danger py-2">${message}</div>`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertHost.innerHTML = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showAlert("Please enter both username and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const result = await apiCall("/api/user/login", "POST", { username, password });
        saveSession(result.data, username);
        window.location.href = "dashboard.html";
      } catch (err) {
        showAlert(err.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
