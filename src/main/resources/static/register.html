<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · Emp Dept</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <div class="brand-icon">ED</div>
        <h4 class="text-center mb-1">Create account</h4>
        <p class="text-center text-muted mb-4">Register to access the dashboard</p>

        <div id="alertHost"></div>

        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" required autofocus />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required minlength="4" />
            <div class="form-text">At least 4 characters.</div>
          </div>
          <button type="submit" class="btn btn-brand w-100" id="registerBtn">Register</button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size: 0.9rem;">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </div>
  </div>

  <div id="toastHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (getToken()) {
      window.location.href = "dashboard.html";
    }

    const form = document.getElementById("registerForm");
    const registerBtn = document.getElementById("registerBtn");
    const alertHost = document.getElementById("alertHost");

    function showAlert(message, variant = "danger") {
      alertHost.innerHTML = `<div class="alert alert-${variant} py-2">${message}</div>`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertHost.innerHTML = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || password.length < 4) {
        showAlert("Please enter a username and a password of at least 4 characters.");
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = "Creating account...";

      try {
        await apiCall("/api/user/userRegistor", "POST", { username, password });
        showAlert("Account created successfully. Redirecting to login...", "success");
        setTimeout(() => (window.location.href = "login.html"), 1200);
      } catch (err) {
        showAlert(err.message);
        registerBtn.disabled = false;
        registerBtn.textContent = "Register";
      }
    });
  </script>
</body>
</html>
